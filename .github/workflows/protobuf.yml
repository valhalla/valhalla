name: release protobuf generated code

on:
  push:
    branches: 
      - nn-pr-protobuf-code
    # tags: ["*"]
 
defaults:
  run:
    working-directory: proto
 
jobs:
  release-python:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # for trusted publishing to PyPI
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0  # setuptools_scm needs tags
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip wheel --no-deps python/ -w python/dist
      - uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: proto/python/dist/
          # uncomment when testing!
          repository-url: https://test.pypi.org/legacy/
 
  release-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0  # versioning schema needs tags
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: make generate-ts version-ts attach-commit-ts build-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
 
