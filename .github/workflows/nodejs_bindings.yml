name: Build Node.js bindings
on:
  push:
    paths-ignore:
      - "**.md"
      - .circleci/
      - docs/
      - run_route_scripts/
      - test_requests/
      - test/check_compilers/
      - .github/workflows/check_compilers.yml
      - ".tx"
      - ".git*"
    branches:
      - master
    tags:
      - '*'
  pull_request:
    paths-ignore:
      - "*.md"
      - .circleci/
      - docs/
      - run_route_scripts/
      - test_requests/
      - test/check_compilers/
      - .github/workflows/check_compilers.yml
      - ".tx"
      - ".git*"
    branches:
      - master

# Cancel CI runs on a branch when new commits were pushed
# See https://stackoverflow.com/a/72408109/2582935
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  build_nodejs_bindings:
    name: Build Node.js bindings (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-latest
            container: ghcr.io/valhalla/manylinux:2_28_valhalla_python
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            container: ghcr.io/valhalla/manylinux:2_28_valhalla_python
          - os: macos
            arch: arm64
            runner: macos-14
            container: null
    steps:
      - run: python3.12 --version
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true
      
      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.os == 'macos' && '/Users/runner/Library/Caches/ccache' || '.ccache' }}
          key: ccache-${{ matrix.os }}-${{ matrix.arch }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.os }}-${{ matrix.arch }}-

      - run: echo $(git rev-parse --short HEAD)

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos'
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install python autoconf automake protobuf cmake ccache libtool sqlite3 libspatialite luajit curl wget czmq lz4 spatialite-tools unzip boost gdal
          export PATH="$(brew --prefix python)/libexec/bin:$PATH"
          sudo python -m pip install --break-system-packages requests shapely
          git clone https://github.com/kevinkreiser/prime_server --recurse-submodules && cd prime_server && ./autogen.sh && ./configure && make -j$(sysctl -n hw.logicalcpu) && sudo make install

      - name: Build Valhalla with Node.js bindings
        run: |
          ${{ matrix.os == 'linux' && 'export LD_LIBRARY_PATH="/usr/local/lib64:/usr/local/lib"' || '' }}
          ${{ matrix.os == 'linux' && 'export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache' || '' }}
          mkdir -p build
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF \
          -DENABLE_NODE_BINDINGS=ON \
          -DENABLE_GDAL=ON \
          -DENABLE_TESTS=OFF \
          -DVALHALLA_VERSION_MODIFIFER=$(git rev-parse --short HEAD) \
          -DENABLE_SINGLE_FILES_WERROR=OFF
          cmake --build build -j${{ matrix.os == 'macos' && '$(sysctl -n hw.logicalcpu)' || '$(nproc)' }}
      
      - name: Show ccache statistics
        run: |
          ${{ matrix.os == 'linux' && 'export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache' || '' }}
          ccache -s
      
      - run: |
          ${{ matrix.os == 'linux' && 'export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache' || '' }}
          ccache -p

      - name: Check dependencies
        run: |
          echo "[INFO] Dependencies:"
          ${{ matrix.os == 'macos' && 'otool -L' || 'ldd' }} build/src/bindings/nodejs/lib/valhalla_node.node
      
      - name: Make relocatable
        run: |
          ${{ matrix.os == 'linux' && 'export LD_LIBRARY_PATH="/usr/local/lib64:/usr/local/lib"' || '' }}
          NODE_FILE="build/src/bindings/nodejs/lib/valhalla_node.node"
          OUTPUT_DIR="nodejs_dist"
          
          # Collect all valhalla_* executables from build directory
          VALHALLA_EXES="build/valhalla_service build/valhalla_build_tiles build/valhalla_build_admins build/valhalla_add_predicted_traffic build/valhalla_add_landmarks build/valhalla_ingest_transit build/valhalla_convert_transit"
          echo "[INFO] Bundling files:"
          echo "  - Node.js addon: $NODE_FILE"
          echo "  - Valhalla executables: $VALHALLA_EXES"
          
          # Bundle everything together
          ${{ matrix.os == 'macos' && 'python' || 'python3.12' }} src/bindings/nodejs/scripts/bundle.py \
            $NODE_FILE $VALHALLA_EXES \
            $OUTPUT_DIR
          
          echo "[INFO] Bundled executables:"
          ls -lh $OUTPUT_DIR/valhalla_* 2>/dev/null || echo "No executables found"
          echo "[INFO] Shared libraries:"
          ls -lh $OUTPUT_DIR/lib/ | head -30
          
          echo "[INFO] Checking binding after bundling..."
          ${{ matrix.os == 'macos' && 'otool -L' || 'ldd' }} $OUTPUT_DIR/valhalla_node.node
          
          echo "[INFO] Checking one executable after bundling..."
          if [ -f "$OUTPUT_DIR/valhalla_build_tiles" ]; then
            ${{ matrix.os == 'macos' && 'otool -L' || 'ldd' }} $OUTPUT_DIR/valhalla_build_tiles
          fi
      
      - name: Upload Node.js binding artifact
        uses: actions/upload-artifact@v4
        with:
          name: valhalla-nodejs-${{ matrix.os }}-${{ matrix.arch }}
          path: nodejs_dist/
  
  package_nodejs_bindings:
    name: Package Node.js bindings for NPM
    runs-on: ubuntu-latest
    needs: [build_nodejs_bindings]
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src/bindings/nodejs/index.js
            src/bindings/nodejs/index.mjs
            src/bindings/nodejs/index.d.ts
            src/bindings/nodejs/package.json
            src/bindings/nodejs/.npmignore
            src/bindings/nodejs/config.json
            src/bindings/nodejs/lib/
            src/bindings/nodejs/bin/
            scripts/valhalla_build_config
            valhalla/valhalla.h
          sparse-checkout-cone-mode: false
          fetch-depth: 0
          fetch-tags: true

      - name: Download all binding artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set package version
        run: |
          # Parse version from valhalla/valhalla.h (e.g., 3.5.1)
          MAJOR=$(grep -oP '#define VALHALLA_VERSION_MAJOR \K\d+' valhalla/valhalla.h)
          MINOR=$(grep -oP '#define VALHALLA_VERSION_MINOR \K\d+' valhalla/valhalla.h)
          PATCH=$(grep -oP '#define VALHALLA_VERSION_PATCH \K\d+' valhalla/valhalla.h)
          BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          
          # For tags: use clean version (e.g., "3.5.1")
          # For non-tags: append git hash (e.g., "3.5.1-abc1234")
          if git describe --exact-match --tags HEAD 2>/dev/null; then
            VERSION="${BASE_VERSION}"
            echo "[INFO] Building tagged release version: ${VERSION}"
          else
            GIT_HASH=$(git rev-parse --short HEAD)
            VERSION="${BASE_VERSION}-${GIT_HASH}"
            echo "[INFO] Building development version: ${VERSION}"
          fi
          
          cd src/bindings/nodejs
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

      - name: Create NPM package structure
        run: |
          mkdir -p valhalla-npm-package
          
          # Copy package files
          cp src/bindings/nodejs/index.js valhalla-npm-package/
          cp src/bindings/nodejs/index.mjs valhalla-npm-package/
          cp src/bindings/nodejs/index.d.ts valhalla-npm-package/
          cp src/bindings/nodejs/package.json valhalla-npm-package/
          cp src/bindings/nodejs/.npmignore valhalla-npm-package/
          cp -r src/bindings/nodejs/lib valhalla-npm-package/
          cp -r src/bindings/nodejs/bin valhalla-npm-package/
          cp scripts/valhalla_build_config valhalla-npm-package/
          
          # Extract and organize bindings by platform
          pushd artifacts
          
          # Process all platforms in a loop
          for platform in "linux:x64" "linux:arm64" "darwin:arm64"; do
            os="${platform%%:*}"
            arch="${platform##*:}"
            platform_name="${os/darwin/macos}"
            
            echo "[INFO] Processing ${platform_name} ${arch}..."
            mkdir -p ../valhalla-npm-package/${os}/${arch}
            mv valhalla-nodejs-${platform_name}-${arch}/valhalla_node.node ../valhalla-npm-package/${os}/${arch}/
            mv valhalla-nodejs-${platform_name}-${arch}/valhalla_* ../valhalla-npm-package/${os}/${arch}/ 2>/dev/null || true
            mv valhalla-nodejs-${platform_name}-${arch}/lib ../valhalla-npm-package/${os}/${arch}/
          done
          
          popd # artifacts
          
          echo "[INFO] Package structure:"
          tree -L 5 valhalla-npm-package/ || find valhalla-npm-package -type f
          
          echo "[INFO] Creating NPM package..."
          pushd valhalla-npm-package
          npm pack
          popd # valhalla-npm-package
          
          echo "[INFO] Package created:"
          ls -lh valhalla-npm-package/*.tgz
          
          echo "[INFO] Package size:"
          du -h valhalla-npm-package/*.tgz

      - name: Upload NPM package
        uses: actions/upload-artifact@v4
        with:
          name: valhalla-npm-package
          path: valhalla-npm-package/*.tgz

  verify_nodejs_package:
    name: Verify NPM package (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [package_nodejs_bindings]
    container: ${{ matrix.container }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-latest
            container: node:18
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            container: node:18
          - os: macos
            arch: arm64
            runner: macos-14
            container: null
    steps:
      - name: Install Node.js (macOS)
        if: matrix.os == 'macos'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Checkout test files
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src/bindings/nodejs/test/
            test/data/utrecht_netherlands.osm.pbf
          sparse-checkout-cone-mode: false

      - name: Download NPM package
        uses: actions/download-artifact@v4
        with:
          name: valhalla-npm-package
      
      - name: Install package
        run: |
          echo "[INFO] Downloaded package:"
          ls -lh *.tgz
          
          echo "[INFO] Installing package..."
          npm install *.tgz
          
          echo "[INFO] Verifying installation..."
          npm list @valhallajs/valhallajs
          
          echo "[INFO] Checking installed files..."
          ls -lh node_modules/@valhallajs/valhallajs/${{ matrix.os == 'macos' && 'darwin' || 'linux' }}/${{ matrix.arch }}/
          
          echo "[INFO] Checking bundled libraries..."
          ls -lh node_modules/@valhallajs/valhallajs/${{ matrix.os == 'macos' && 'darwin' || 'linux' }}/${{ matrix.arch }}/lib/ 
          
          echo "[INFO] Checking binding dependencies..."
          ${{ matrix.os == 'macos' && 'otool -L' || 'ldd' }} node_modules/@valhallajs/valhallajs/${{ matrix.os == 'macos' && 'darwin' || 'linux' }}/${{ matrix.arch }}/valhalla_node.node
      - run: ls -R node_modules/@valhallajs/valhallajs
      
      - name: Test package import (CommonJS)
        run: |
          echo "[INFO] Testing CommonJS import..."
          node src/bindings/nodejs/test/test-commonjs.js
      
      - name: Test package import (ESM)
        run: |
          echo "[INFO] Testing ESM import..."
          node src/bindings/nodejs/test/test-esm.mjs
      
      - name: Check file permissions
        run: |
          echo "[INFO] Checking file permissions in binaries directory..."
          ls -lah node_modules/@valhallajs/valhallajs/${{ matrix.os == 'macos' && 'darwin' || 'linux' }}/${{ matrix.arch }}/ | head -20
      
      - name: Test CLI
        run: |
          echo "[INFO] Testing CLI with debug mode..."
          export VALHALLA_DEBUG=1
          npx valhalla build_tiles --help


