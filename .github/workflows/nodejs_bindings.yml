name: Build Node.js bindings

# this workflow:
# - builds Node.js bindings for Linux (x64, arm64) and macOS (arm64)
# - packages all bindings into a single NPM-ready package
# - verifies the complete package works on each platform by installing and importing it

on:
  push:
    paths-ignore:
      - "**.md"
      - .circleci/
      - docs/
      - run_route_scripts/
      - test_requests/
      - test/check_compilers/
      - .github/workflows/check_compilers.yml
      - ".tx"
      - ".git*"
    branches:
      - master
    tags:
      - '*'
  pull_request:
    paths-ignore:
      - "*.md"
      - .circleci/
      - docs/
      - run_route_scripts/
      - test_requests/
      - test/check_compilers/
      - .github/workflows/check_compilers.yml
      - ".tx"
      - ".git*"
    branches:
      - master

# Cancel CI runs on a branch when new commits were pushed
# See https://stackoverflow.com/a/72408109/2582935
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  build_nodejs_bindings:
    name: Build Node.js bindings (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-latest
            container: ghcr.io/valhalla/manylinux:2_28_valhalla_python
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            container: ghcr.io/valhalla/manylinux:2_28_valhalla_python
          - os: macos
            arch: arm64
            runner: macos-14
            container: null
    steps:
      - run: python3.12 --version
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true
      
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos'
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install python autoconf automake protobuf cmake ccache libtool sqlite3 libspatialite luajit curl wget czmq lz4 spatialite-tools unzip boost gdal
          export PATH="$(brew --prefix python)/libexec/bin:$PATH"
          sudo python -m pip install --break-system-packages requests shapely
          git clone https://github.com/kevinkreiser/prime_server --recurse-submodules && cd prime_server && ./autogen.sh && ./configure && make -j$(sysctl -n hw.logicalcpu) && sudo make install

      - name: Build Valhalla with Node.js bindings
        run: |
          ${{ matrix.os == 'linux' && 'export LD_LIBRARY_PATH="/usr/local/lib64:/usr/local/lib"' || '' }}
          mkdir -p build
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF \
          -DENABLE_NODE_BINDINGS=ON \
          -DENABLE_GDAL=ON \
          -DENABLE_TESTS=OFF \
          -DVALHALLA_VERSION_MODIFIFER=1 \
          -DENABLE_SINGLE_FILES_WERROR=OFF
          cmake --build build -j$(nproc)
      
      - name: Check dependencies
        run: |
          echo "[INFO] Dependencies:"
          ${{ matrix.os == 'macos' && 'otool -L' || 'ldd' }} build/src/bindings/nodejs/lib/valhalla_node.node
      
      - name: Make relocatable
        run: |
          ${{ matrix.os == 'linux' && 'export LD_LIBRARY_PATH="/usr/local/lib64:/usr/local/lib"' || '' }}
          NODE_FILE="build/src/bindings/nodejs/lib/valhalla_node.node"
          OUTPUT_DIR="nodejs_dist"
          
          # Collect all valhalla_* executables from build directory
          VALHALLA_EXES=$(find build -maxdepth 1 -type f -name 'valhalla_*' -executable | tr '\n' ' ')
          
          echo "[INFO] Bundling files:"
          echo "  - Node.js addon: $NODE_FILE"
          echo "  - Valhalla executables: $VALHALLA_EXES"
          
          # Bundle everything together
          ${{ matrix.os == 'macos' && 'python' || 'python3.12' }} src/bindings/nodejs/scripts/bundle.py \
            $NODE_FILE $VALHALLA_EXES \
            $OUTPUT_DIR --strip --tar
          
          mv valhalla_node-bundle.tar.gz valhalla-nodejs-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

          echo "[INFO] Contents of tarball:"
          tar -tzf valhalla-nodejs-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          
          echo "[INFO] Verifying bundled libraries..."
          tar -xzf valhalla-nodejs-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          echo "[INFO] Bundled executables:"
          ls -lh $OUTPUT_DIR/valhalla_* 2>/dev/null || echo "No executables found"
          echo "[INFO] Shared libraries:"
          ls -lh $OUTPUT_DIR/lib/ | head -30
          
          echo "[INFO] Checking binding after bundling..."
          ${{ matrix.os == 'macos' && 'otool -L' || 'ldd' }} $OUTPUT_DIR/valhalla_node.node
          
          echo "[INFO] Checking one executable after bundling..."
          if [ -f "$OUTPUT_DIR/valhalla_build_tiles" ]; then
            ${{ matrix.os == 'macos' && 'otool -L' || 'ldd' }} $OUTPUT_DIR/valhalla_build_tiles
          fi
      
      - name: Upload Node.js binding artifact
        uses: actions/upload-artifact@v4
        with:
          name: valhalla-nodejs-${{ matrix.os }}-${{ matrix.arch }}
          path: valhalla-nodejs-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
  
  package_nodejs_bindings:
    name: Package Node.js bindings for NPM
    runs-on: ubuntu-latest
    needs: [build_nodejs_bindings]
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src/bindings/nodejs/index.js
            src/bindings/nodejs/index.mjs
            src/bindings/nodejs/index.d.ts
            src/bindings/nodejs/package.json
            src/bindings/nodejs/.npmignore
            src/bindings/nodejs/lib/
            src/bindings/nodejs/bin/
          sparse-checkout-cone-mode: false

      - name: Download all binding artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create NPM package structure
        run: |
          mkdir -p valhalla-npm-package
          
          # Copy package files
          cp src/bindings/nodejs/index.js valhalla-npm-package/
          cp src/bindings/nodejs/index.mjs valhalla-npm-package/
          cp src/bindings/nodejs/index.d.ts valhalla-npm-package/
          cp src/bindings/nodejs/package.json valhalla-npm-package/
          cp src/bindings/nodejs/.npmignore valhalla-npm-package/
          cp -r src/bindings/nodejs/lib valhalla-npm-package/
          cp -r src/bindings/nodejs/bin valhalla-npm-package/
          
          # Extract and organize bindings by platform
          cd artifacts
          
          # Process Linux x64
          echo "[INFO] Processing Linux x64..."
          mkdir -p ../valhalla-npm-package/linux/x86_64
          tar -xzf valhalla-nodejs-linux-x64/valhalla-nodejs-linux-x64.tar.gz
          mv nodejs_dist/valhalla_node.node ../valhalla-npm-package/linux/x86_64/
          mv nodejs_dist/valhalla_* ../valhalla-npm-package/linux/x86_64/ 2>/dev/null || true
          mv nodejs_dist/lib ../valhalla-npm-package/linux/x86_64/
          rm -rf nodejs_dist
          
          # Process Linux arm64
          echo "[INFO] Processing Linux arm64..."
          mkdir -p ../valhalla-npm-package/linux/arm64
          tar -xzf valhalla-nodejs-linux-arm64/valhalla-nodejs-linux-arm64.tar.gz
          mv nodejs_dist/valhalla_node.node ../valhalla-npm-package/linux/arm64/
          mv nodejs_dist/valhalla_* ../valhalla-npm-package/linux/arm64/ 2>/dev/null || true
          mv nodejs_dist/lib ../valhalla-npm-package/linux/arm64/
          rm -rf nodejs_dist
          
          # Process macOS arm64
          echo "[INFO] Processing macOS arm64..."
          mkdir -p ../valhalla-npm-package/darwin/arm64
          tar -xzf valhalla-nodejs-macos-arm64/valhalla-nodejs-macos-arm64.tar.gz
          mv nodejs_dist/valhalla_node.node ../valhalla-npm-package/darwin/arm64/
          mv nodejs_dist/valhalla_* ../valhalla-npm-package/darwin/arm64/ 2>/dev/null || true
          mv nodejs_dist/lib ../valhalla-npm-package/darwin/arm64/
          rm -rf nodejs_dist
          
          cd ..
          
          echo "[INFO] Package structure:"
          tree -L 3 valhalla-npm-package/ || find valhalla-npm-package -type f | head -30
          
          echo "[INFO] Creating NPM package..."
          cd valhalla-npm-package
          npm pack
          cd ..
          
          echo "[INFO] Package created:"
          ls -lh valhalla-npm-package/*.tgz
          
          echo "[INFO] Package size:"
          du -h valhalla-npm-package/*.tgz

      - name: Upload NPM package
        uses: actions/upload-artifact@v4
        with:
          name: valhalla-npm-package
          path: valhalla-npm-package/*.tgz

  verify_nodejs_package:
    name: Verify NPM package (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [package_nodejs_bindings]
    container: ${{ matrix.container }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-latest
            container: node:18
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            container: node:18
          - os: macos
            arch: arm64
            runner: macos-14
            container: null
    steps:
      - name: Install Node.js (macOS)
        if: matrix.os == 'macos'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Download NPM package
        uses: actions/download-artifact@v4
        with:
          name: valhalla-npm-package
      
      - name: Install package
        run: |
          echo "[INFO] Downloaded package:"
          ls -lh *.tgz
          
          echo "[INFO] Installing package..."
          npm install *.tgz
          
          echo "[INFO] Verifying installation..."
          npm list valhalla
          
          echo "[INFO] Checking installed files..."
          ls -lh node_modules/valhalla/${{ matrix.os == 'macos' && 'darwin' || 'linux' }}/${{ matrix.arch == 'x64' && 'x86_64' || matrix.arch }}/
          
          echo "[INFO] Checking bundled libraries..."
          ls -lh node_modules/valhalla/${{ matrix.os == 'macos' && 'darwin' || 'linux' }}/${{ matrix.arch == 'x64' && 'x86_64' || matrix.arch }}/lib/ 
          
          echo "[INFO] Checking binding dependencies..."
          ${{ matrix.os == 'macos' && 'otool -L' || 'ldd' }} node_modules/valhalla/${{ matrix.os == 'macos' && 'darwin' || 'linux' }}/${{ matrix.arch == 'x64' && 'x86_64' || matrix.arch }}/valhalla_node.node
      
      - name: Test package import
        run: |
          echo "[INFO] Testing package import..."
          cat > test.js << 'EOF'
          try {
            const valhalla = require('valhalla');
            console.log('[SUCCESS] Valhalla package loaded successfully!');
            console.log('[INFO] VALHALLA_VERSION:', valhalla.VALHALLA_VERSION);
            console.log('[INFO] Available exports:', Object.keys(valhalla));
            
            // Basic functionality test
            if (typeof valhalla.VALHALLA_VERSION === 'string' && valhalla.VALHALLA_VERSION.length > 0) {
              console.log('[SUCCESS] Version check passed');
            } else {
              console.error('[ERROR] Invalid version');
              process.exit(1);
            }
            
            process.exit(0);
          } catch (error) {
            console.error('[ERROR] Failed to load Valhalla package:', error.message);
            console.error(error.stack);
            process.exit(1);
          }
          EOF
          
          node test.js
