# https://www.mkdocs.org/user-guide/configuration/

theme:
  name: material
  logo: images/valhalla_logo.svg
  favicon: images/valhalla_logo.svg
  features:
    - content.tabs.link
    - navigation.instant
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      primary: black
      accent: deep purple

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
      primary: white
      accent: lime

markdown_extensions:
  - toc:
      permalink: True
  - attr_list
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.highlight
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [../src/bindings/python]
          options:
            # parse :param:/:returns:/:raises: RST directives in docstrings
            docstring_style: sphinx
            # render param/return/raise blocks as a typed table with a description column
            docstring_section_style: spacy
            # list members in source order, not alphabetical
            members_order: source
            # render the symbol's name as the page's main heading
            show_root_heading: true
            # heading shows "Actor" rather than the full dotted path "valhalla.actor.Actor"
            show_root_full_path: false
            # fold __init__'s params/docs into the class entry instead of a nested section
            merge_init_into_class: true
            # render the signature on its own line below the symbol name (more readable for long sigs)
            separate_signature: true
            # include type hints in the rendered signature
            show_signature_annotations: true
            # surface members inherited from base classes (e.g. _Actor methods on Actor)
            inherited_members: true
            # don't render a [source] link/snippet per symbol — paths point inside .pyi anyway
            show_source: false
            # hide underscore-prefixed members (e.g. _Actor, _GraphUtils) from the rendered output
            filters: ["!^_"]

site_name: Valhalla Docs
repo_url: https://github.com/valhalla/valhalla/
edit_uri: edit/master/docs/docs/
site_url: https://valhalla.github.io/valhalla
docs_dir: docs
